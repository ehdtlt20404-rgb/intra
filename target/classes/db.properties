# ============================================================
# Oracle DB 접속 정보 — 본인 환경에 맞게 수정하세요
# ============================================================

# SID 방식:  jdbc:oracle:thin:@호스트:포트:SID
# Service 방식: jdbc:oracle:thin:@호스트:포트/서비스명
db.driver=oracle.jdbc.OracleDriver
db.url=jdbc:oracle:thin:@localhost:1521:XE
db.username=WARDEN
db.password=warden1234

# ============================================================
# Connection Pool (DBCP2)
# ============================================================
db.initialSize=3
db.maxTotal=20
db.maxIdle=10
db.minIdle=3
db.maxWaitMillis=5000
db.validationQuery=SELECT 1 FROM DUAL
db.testOnBorrow=true
db.testWhileIdle=true
